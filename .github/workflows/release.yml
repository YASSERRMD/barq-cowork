name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
      sign_macos:
        description: "Enable macOS code signing and notarization"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build the Go backend sidecar for each platform
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Backend (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin

          - os: windows-latest
            goos: windows
            goarch: amd64
            target: x86_64-pc-windows-msvc
            ext: .exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build barq-coworkd
        shell: bash
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd backend
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "../apps/desktop/src-tauri/binaries/barq-coworkd-${{ matrix.target }}${{ matrix.ext }}" \
            ./cmd/barq-coworkd

      - name: Upload sidecar binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/barq-coworkd-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Build the Tauri desktop app
  # ─────────────────────────────────────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.target }})
    needs: build-backend
    runs-on: ${{ matrix.os }}
    env:
      MACOS_SIGNING_READY: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_macos == true && secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && 'true' || 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      # Rust toolchain
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # Node / Frontend
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        shell: bash
        working-directory: apps/desktop
        run: npm ci

      # Download sidecar binary
      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/

      - name: Make sidecar executable (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: chmod +x apps/desktop/src-tauri/binaries/barq-coworkd-${{ matrix.target }}

      # Signed macOS builds are opt-in so tag releases remain stable even when
      # Apple signing credentials are unavailable or intentionally omitted.
      - name: Tauri build (signed macOS)
        if: runner.os == 'macOS' && env.MACOS_SIGNING_READY == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath:  apps/desktop
          tagName:      ${{ env.RELEASE_TAG }}
          releaseName:  "Barq Cowork ${{ env.RELEASE_TAG }}"
          releaseBody:  |
            ## Barq Cowork ${{ env.RELEASE_TAG }}

            Cross-platform desktop AI agent workspace.

            ### Downloads

            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `Barq_Cowork_*_aarch64.dmg` |
            | Windows | `Barq_Cowork_*_x64-setup.exe` |

            > **macOS note:** If the app shows "damaged" or won't open, download **`mac-setup.command`** from the assets below and double-click it once after installing. This is a one-time step for unsigned builds.

            See [docs/building.md](https://github.com/${{ github.repository }}/blob/main/docs/building.md) to build from source.
          releaseDraft: false
          prerelease:   ${{ contains(github.ref_name, '-') }}
          args:         --target ${{ matrix.target }}

      - name: Tauri build (default unsigned)
        if: runner.os != 'macOS' || env.MACOS_SIGNING_READY != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath:  apps/desktop
          tagName:      ${{ env.RELEASE_TAG }}
          releaseName:  "Barq Cowork ${{ env.RELEASE_TAG }}"
          releaseBody:  |
            ## Barq Cowork ${{ env.RELEASE_TAG }}

            Cross-platform desktop AI agent workspace.

            ### Downloads

            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `Barq_Cowork_*_aarch64.dmg` |
            | Windows | `Barq_Cowork_*_x64-setup.exe` |

            > **macOS note:** If the app shows "damaged" or won't open, download **`mac-setup.command`** from the assets below and double-click it once after installing. This is a one-time step for unsigned builds.

            See [docs/building.md](https://github.com/${{ github.repository }}/blob/main/docs/building.md) to build from source.
          releaseDraft: false
          prerelease:   ${{ contains(github.ref_name, '-') }}
          args:         --target ${{ matrix.target }}

      # Upload macOS setup helper as a release asset (one-time quarantine fix for unsigned builds)
      - name: Upload macOS setup helper
        if: runner.os == 'macOS'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: scripts/mac-setup.command
          asset_name: mac-setup.command
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true

  # ─────────────────────────────────────────────────────────────────────────
  # Backend unit tests
  # ─────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run tests
        working-directory: backend
        run: go test ./... -race -timeout 60s

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend type-check
  # ─────────────────────────────────────────────────────────────────────────
  type-check-frontend:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Type-check
        working-directory: apps/desktop
        run: npx tsc --noEmit
