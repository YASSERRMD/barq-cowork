name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build the Go backend sidecar for each platform
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Backend (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin

          - os: windows-latest
            goos: windows
            goarch: amd64
            target: x86_64-pc-windows-msvc
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build barq-coworkd
        shell: bash
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd backend
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "../apps/desktop/src-tauri/binaries/barq-coworkd-${{ matrix.target }}${{ matrix.ext }}" \
            ./cmd/barq-coworkd

      - name: Upload sidecar binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/barq-coworkd-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Build the Tauri desktop app
  # ─────────────────────────────────────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.target }})
    needs: build-backend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      # Rust toolchain
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # Node / Frontend
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        shell: bash
        working-directory: apps/desktop
        run: npm ci

      # Download sidecar binary
      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/

      - name: Make sidecar executable (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: chmod +x apps/desktop/src-tauri/binaries/barq-coworkd-${{ matrix.target }}

      # Tauri build + GitHub Release
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath:  apps/desktop
          tagName:      ${{ github.ref_name }}
          releaseName:  "Barq Cowork ${{ github.ref_name }}"
          releaseBody:  |
            ## Barq Cowork ${{ github.ref_name }}

            Cross-platform desktop AI agent workspace.

            ### Downloads

            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `Barq_Cowork_*_aarch64.dmg` |
            | Windows | `Barq_Cowork_*_x64-setup.exe` |

            See [docs/building.md](https://github.com/${{ github.repository }}/blob/main/docs/building.md) to build from source.
          releaseDraft: false
          prerelease:   ${{ contains(github.ref_name, '-') }}
          args:         --target ${{ matrix.target }}

  # ─────────────────────────────────────────────────────────────────────────
  # Backend unit tests
  # ─────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Run tests
        working-directory: backend
        run: go test ./... -race -timeout 60s

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend type-check
  # ─────────────────────────────────────────────────────────────────────────
  type-check-frontend:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Type-check
        working-directory: apps/desktop
        run: npx tsc --noEmit
