<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="18" fill="#0a0f1e"/>
  <polygon points="58,8 22,52 45,52 42,92 78,48 55,48" fill="none" stroke="#f97316" stroke-width="3" filter="url(#glow)" stroke-linejoin="round"/>
  <polygon points="58,8 22,52 45,52 42,92 78,48 55,48" fill="#f97316" opacity="0.15"/>
  <!-- circuit dots -->
  <circle cx="58" cy="8" r="2.5" fill="#f97316" filter="url(#glow)"/>
  <circle cx="22" cy="52" r="2.5" fill="#f97316" filter="url(#glow)"/>
  <circle cx="45" cy="52" r="2.5" fill="#f97316" filter="url(#glow)"/>
  <circle cx="42" cy="92" r="2.5" fill="#f97316" filter="url(#glow)"/>
  <circle cx="78" cy="48" r="2.5" fill="#f97316" filter="url(#glow)"/>
  <circle cx="55" cy="48" r="2.5" fill="#f97316" filter="url(#glow)"/>
  <!-- circuit lines -->
  <line x1="35" y1="30" x2="48" y2="22" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="35" x2="70" y2="28" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
  <line x1="30" y1="58" x2="18" y2="65" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
  <line x1="55" y1="70" x2="65" y2="78" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
  <circle cx="48" cy="22" r="1.5" fill="#f97316" opacity="0.7"/>
  <circle cx="70" cy="28" r="1.5" fill="#f97316" opacity="0.7"/>
  <circle cx="18" cy="65" r="1.5" fill="#f97316" opacity="0.7"/>
  <circle cx="65" cy="78" r="1.5" fill="#f97316" opacity="0.7"/>
</svg>
